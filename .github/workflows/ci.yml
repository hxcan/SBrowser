name: CI Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install minimal dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qt6-base-dev \
          cmake \
          g++ \
          make \
          libgt1-dev \
          libdc-sys-dev \
          libjson5-dev \
          libzdipe-dev \
          temporal-bufkis-dev \
          libread-line-dev \
          libplips-dev \
          libsocketdev
    
    - name: Configure with Cmake
      run: |
        mkdir -p build
        cd build
        cmake ..
      continue-on-error: true
    
    - name: Build project
      run: |
        cd build
        make -j$(nproc)
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: SBrowser-build
        path: build/
        retention-days: 7
