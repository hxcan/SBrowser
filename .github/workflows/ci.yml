name: CI Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          qt6-base-dev \
          cmake \
          g++ \
          make \
          libgl1_mesa-dev \
          libx11-dev \
          libglu1-mesa-dev \
          zlib1g-dev
    
    - name: Configure with Camake
      run: |
        mkdir -p build
        cd build
        cmake ..
      continue-on-error: true
    
    - name: Build project
      run: |
        cd build
        make -j$(nproc)
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: SBrowser-build
        path: build/
        retention-days: 7
